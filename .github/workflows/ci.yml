# Copyright 2026 Tom F. (https://github.com/tomtom215)
#
# Continuous integration — every quality gate from docs/plan/04-engineering-standards.md.
#
# Jobs: format, clippy (stable + MSRV × 3 OS × 3 feature modes), test (same matrix),
#       docs (-D warnings), cargo-deny, package validation, nightly (informational).
#
# Toolchains are installed with plain `rustup` rather than a third-party action:
# one fewer supply-chain dependency. Remaining actions are pinned by commit SHA.

name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

# Cancel superseded runs on branches/PRs; never cancel main-branch builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # actions/checkout's pinned SHA predates the runner's Node 24 default cutover
  # (June 16, 2026); opt in now rather than break later.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --no-self-update
          rustup default stable
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy (${{ matrix.rust }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, "1.88"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install toolchain
        run: |
          rustup toolchain install ${{ matrix.rust }} --profile minimal --component clippy --no-self-update
          rustup default ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Clippy (no default features)
        run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings
      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.rust }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, "1.88"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install toolchain
        run: |
          rustup toolchain install ${{ matrix.rust }} --profile minimal --no-self-update
          rustup default ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Test (default features)
        run: cargo test --workspace
      - name: Test (no default features)
        run: cargo test --workspace --no-default-features
      - name: Test (all features)
        run: cargo test --workspace --all-features

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build docs (zero warnings)
        run: cargo doc --workspace --no-deps
      # Feature-gated modules (the everything-server's `tap`) carry rustdoc the
      # default-feature build never sees; a broken intra-doc link there is only
      # caught with --all-features.
      - name: Build docs with all features (zero warnings)
        run: cargo doc --workspace --no-deps --all-features
      - name: README coverage table in sync with the registry
        run: cargo xtask coverage --check
      - name: File-size cap on source and registry files
        run: cargo xtask file-sizes
      - name: Documentation links resolve
        run: cargo xtask docs-links

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # Pinned to the release tag's commit (not the floating `v2` tag's
      # annotated-tag object, which the 2026-06-11 audit found this line
      # carrying: such an object survives only as an unreferenced blob in
      # upstream's object store once `v2` moves again — resolvable today,
      # GC bait tomorrow, and invisible to dependabot).
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check

  package:
    name: Package validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # `--workspace` resolves path+version deps against sibling crates rather than
      # crates.io, which is what pre-publish validation needs. xtask is publish=false
      # but `cargo package --workspace` still packages it (v0.1.0 shipped a stray
      # xtask .crate before release.yml learned this) — exclude it here for the same
      # reason, so this job validates exactly what a release would package.
      - name: Package all publishable crates
        run: cargo package --workspace --exclude xtask --locked

  nightly:
    name: Nightly (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install toolchain
        run: |
          rustup toolchain install nightly --profile minimal --no-self-update
          rustup default nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Test (all features, nightly)
        run: cargo test --workspace --all-features

  # Proves the `>=` floors in workspace dependency ranges are real: resolve every
  # dependency to its minimum allowed version (nightly resolver flag), then build and
  # test on stable against that lockfile. Informational like the nightly job — a red
  # run means a floor needs raising, not that the tree is broken.
  minimal-versions:
    name: Minimal versions (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install toolchains
        run: |
          rustup toolchain install nightly --profile minimal --no-self-update
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Resolve minimal versions
        run: cargo +nightly generate-lockfile -Zminimal-versions
      - name: Test against minimum dependency versions
        run: cargo test --workspace --all-features --locked

  # The M2+M3 hard gate: the pinned official suite's server scenarios against
  # the everything server over streamable HTTP, then the client leg — the
  # reference host as the suite's client SUT (four protocol scenarios,
  # sequential so the sse-retry clock is never under parallel load), a
  # child-process stdio smoke between the two real binaries, and the
  # agreement replay on both sides (cargo xtask conformance documents the
  # steps and the version pin). This job is the one deliberate exception
  # to "no network beyond the package registries": npx fetches the pinned
  # runner from npm, and the runner dials loopback in both directions. Tests
  # (`cargo test` anywhere in the workspace) still never touch a network.
  conformance:
    name: Conformance (official suite, server + client scenarios)
    runs-on: ubuntu-latest
    # A warm run takes ~2 minutes; the bound exists because this is the one
    # job whose tools (npx, the runner) can hang on network state, and a
    # wedged job should fail in minutes, not at the 6-hour runner cap.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Runner prerequisites (Node is preinstalled on the runner image)
        run: node --version && npx --version
      - name: Official suite vs everything-server
        run: cargo xtask conformance
      - name: Upload scenario verdicts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: conformance-verdicts
          path: target/conformance/
          if-no-files-found: warn
          retention-days: 30
