#
# Mutation testing, diff-scoped to the PR (the a2a-rust `--in-diff` pattern): every
# mutant in changed code must be caught by a test. The full-workspace sweep runs on a
# schedule in scheduled.yml; this gate keeps PR feedback fast while still enforcing
# the zero-surviving-mutants standard where it matters most — the code being changed.

name: Mutants

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

env:
  # actions/checkout's pinned SHA predates the runner's Node 24 default cutover
  # (June 16, 2026); opt in now rather than break later.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always

jobs:
  incremental:
    name: Mutants (PR diff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # Compiled from source with --locked for reproducibility; the rust-cache step
      # caches the installed binary between runs.
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      - name: Compute PR diff
        run: git diff "origin/${{ github.base_ref }}..." > pr.diff
      - name: Run mutants on changed code
        run: cargo mutants --workspace --no-shuffle --in-diff pr.diff
