#
# Scheduled hygiene: weekly RustSec audit and the full mutation sweep that PR-scoped
# runs (mutants.yml) deliberately skip. Manually dispatchable for on-demand runs.

name: Scheduled

on:
  schedule:
    # Mondays 06:00 UTC — early enough that a red run is seen the same day.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  # actions/checkout's pinned SHA predates the runner's Node 24 default cutover
  # (June 16, 2026); opt in now rather than break later.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: cargo-audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit

  full-mutants:
    name: Mutants (full sweep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      # The standard (docs/plan/04-engineering-standards.md): zero surviving mutants
      # in every shipped crate (xtask is excluded via .cargo/mutants.toml).
      - name: Full workspace sweep
        # `-- --all-features` for the same reason as the PR gate: mutation
        # coverage must include feature-gated code (see mutants.yml).
        run: cargo mutants --workspace --no-shuffle -- --all-features

  # Early warning on the suite's next line (docs/plan/03-conformance-strategy.md:
  # "track the 0.2.0-alpha line in a scheduled, non-blocking CI job"). The npm
  # `alpha` dist-tag floats by design — this job exists to hear breakage coming,
  # so it tracks whatever upstream currently calls alpha; the PR gate stays on
  # the exact pin in xtask. Failures here are signal to read, never a gate.
  suite-alpha:
    name: Conformance (suite alpha line, informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Official suite (alpha dist-tag) vs everything-server
        run: cargo xtask conformance
        env:
          MCP_SUITE_VERSION: alpha

  fuzz:
    name: Fuzz (trace parse, canonical JSON, registry parse)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install toolchain
        run: |
          rustup toolchain install nightly --profile minimal --no-self-update
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: fuzz
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      # Five minutes per target weekly; committed seed corpora keep coverage warm.
      # The canonical_json target asserts parse(canonical(v)) == v, not mere survival,
      # and trace_parse runs every parseable input through the full validation engine.
      - name: Fuzz all targets
        run: |
          for target in trace_parse canonical_json registry_parse; do
            cargo +nightly fuzz run "$target" -- -max_total_time=300
          done
      # The corpus libFuzzer grew this run, uploaded so coverage accumulates
      # across weeks instead of restarting from the committed seeds (the
      # round-two deferral "corpora seed-only", liquidated). Promoting an
      # interesting artifact into the committed seeds stays a deliberate PR.
      - name: Upload grown corpora
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-corpora-${{ github.run_id }}
          path: fuzz/corpus/
          if-no-files-found: warn
          retention-days: 90

  # Bench history accumulates as weekly artifacts (the round-two deferral
  # "bench history not accumulating", liquidated): measured, never gated —
  # benches/README.md records why no threshold exists. Compare runs by
  # downloading two artifacts and diffing criterion's estimates.
  bench:
    name: Benchmarks (history artifact)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run benchmarks
        run: cargo bench --workspace
      - name: Upload criterion estimates
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-history-${{ github.run_id }}
          path: target/criterion/
          if-no-files-found: error
          retention-days: 90

  # The claims-expire gates (ADR-0010): the deferral ledger's review-by dates
  # and the registry's verbatim quotes, both re-verified weekly. Failures
  # here page the schedule, not PRs — an expired deferral or a drifted quote
  # is a maintenance event, not a defect in unrelated work.
  claims-expire:
    name: Deferral ledger + spec-quote drift (ADR-0010)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Deferral ledger within its review dates
        run: cargo xtask deferrals --check
      - name: Registry quotes match the published spec text
        run: cargo xtask spec-drift
