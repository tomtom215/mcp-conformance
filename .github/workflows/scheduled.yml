#
# Scheduled hygiene: weekly RustSec audit, the full mutation sweep that PR-scoped
# runs (mutants.yml) deliberately skip, fuzzing, a cargo-careful UB/overflow run
# over the engine crates, a cross-architecture (s390x/powerpc/i686) byte-identity
# check, a minimal-versions dependency-floor check, benchmarks, and the
# claims-expiry gates. Manually dispatchable for on-demand runs.

name: Scheduled

on:
  schedule:
    # Mondays 06:00 UTC — early enough that a red run is seen the same day.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  # actions/checkout's pinned SHA predates the runner's Node 24 default cutover
  # (June 16, 2026); opt in now rather than break later.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: cargo-audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit

  full-mutants:
    name: Mutants (full sweep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      # The standard (docs/plan/04-engineering-standards.md): zero surviving mutants
      # in every shipped crate (xtask is excluded via .cargo/mutants.toml).
      - name: Full workspace sweep
        # `-- --all-features` for the same reason as the PR gate: mutation
        # coverage must include feature-gated code (see mutants.yml).
        run: cargo mutants --workspace --no-shuffle -- --all-features

  # Early warning on the suite's next line (docs/plan/03-conformance-strategy.md:
  # "track the 0.2.0-alpha line in a scheduled, non-blocking CI job"). The npm
  # `alpha` dist-tag floats by design — this job exists to hear breakage coming,
  # so it tracks whatever upstream currently calls alpha; the PR gate stays on
  # the exact pin in xtask. Failures here are signal to read, never a gate.
  suite-alpha:
    name: Conformance (suite alpha line, informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Official suite (alpha dist-tag) vs everything-server
        run: cargo xtask conformance
        env:
          MCP_SUITE_VERSION: alpha

  fuzz:
    name: Fuzz (trace parse, canonical JSON, registry parse)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install toolchain
        run: |
          rustup toolchain install nightly --profile minimal --no-self-update
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: fuzz
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      # Five minutes per target weekly; committed seed corpora keep coverage warm.
      # The canonical_json target asserts parse(canonical(v)) == v, not mere survival,
      # and trace_parse runs every parseable input through the full validation engine.
      - name: Fuzz all targets
        run: |
          for target in trace_parse canonical_json registry_parse; do
            cargo +nightly fuzz run "$target" -- -max_total_time=300
          done
      # The corpus libFuzzer grew this run, uploaded so coverage accumulates
      # across weeks instead of restarting from the committed seeds (the
      # round-two deferral "corpora seed-only", liquidated). Promoting an
      # interesting artifact into the committed seeds stays a deliberate PR.
      - name: Upload grown corpora
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-corpora-${{ github.run_id }}
          path: fuzz/corpus/
          if-no-files-found: warn
          retention-days: 90

  # The engine crates' test suites, run against a std built with debug
  # assertions and extra const-UB checks (cargo-careful). A `forbid(unsafe_code)`
  # crate cannot author UB itself, but the dependencies it exercises can, and an
  # integer-overflow or const-UB regression a release build folds silently fails
  # here. This is the correctness floor mutation and fuzzing hold, viewed through
  # a third lens; nightly-bound like the fuzz job, and a real gate, not
  # informational — a finding is a genuine defect, not a nightly-churn artifact.
  careful:
    name: cargo-careful (UB / overflow on the engine crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install nightly toolchain (with rust-src for the careful sysroot)
        run: rustup toolchain install nightly --profile minimal --component rust-src --no-self-update
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-careful
        run: cargo install cargo-careful --locked
      # These two crates have no behavior-affecting feature split — core has no
      # features, and the validator's only feature (`cli`) is its default — so
      # `--all-features` is the whole surface and one careful build covers it.
      # Mutation and fuzz already hold these crates to the highest bar; this is a
      # third lens. `careful` builds the checked sysroot on first run (rust-src).
      - name: Run the engine suites under the careful sysroot
        run: cargo +nightly careful test -p mcp-conformance-core -p mcp-trace-validator --all-features

  # Byte-identical output across architectures (M1 DoD: "byte-identical reports
  # across platforms"). Every other job here runs 64-bit little-endian — the CI
  # hosts are x86-64/aarch64 Linux/macOS/Windows — so the canonical JSON form,
  # the JSON/JUnit reports, and the golden corpus had only ever been pinned
  # 64-bit little-endian. This matrix runs the engine crates' suites on the three
  # corners of the (endianness x pointer-width) square those hosts leave untested:
  # s390x (64-bit BE) and powerpc (32-bit BE) under qemu-user, and i686 (32-bit
  # LE) natively via multilib. The arches are split into separate runners because
  # the 32-bit gcc-multilib and the big-endian cross-gccs hard-conflict at the
  # dpkg level (Conflicts:), so they cannot share one apt root; each leg installs
  # only its own toolchain and `cargo xtask cross-arch` runs that arch and loudly
  # skips the rest. On the qemu targets two tests are out of scope by construction
  # — a native frame-budget proof (non-portable to emulation, as under miri) and
  # the cli suite (a cross-built child qemu-user cannot exec without binfmt); i686
  # runs natively, so its whole suite runs unskipped. A byte-for-byte divergence
  # on any of them is a real defect, not a nightly-churn artifact.
  cross-arch:
    name: Cross-arch byte-identity (${{ matrix.note }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust_target: s390x-unknown-linux-gnu
            apt: gcc-s390x-linux-gnu qemu-user-static
            note: s390x 64-bit BE
          - rust_target: powerpc-unknown-linux-gnu
            apt: gcc-powerpc-linux-gnu qemu-user-static
            note: powerpc 32-bit BE
          - rust_target: i686-unknown-linux-gnu
            apt: gcc-multilib
            note: i686 32-bit
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install toolchain (with the ${{ matrix.rust_target }} std target)
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup target add ${{ matrix.rust_target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install the cross toolchain for ${{ matrix.note }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}
      - name: Build and run the engine suite on ${{ matrix.note }}
        run: cargo xtask cross-arch

  # Dependency floors are honest: the declared `>=x.y.z` lower bounds are the
  # oldest versions the workspace actually resolves to and builds/tests against,
  # not assertions. `cargo xtask minimal-versions` pins every direct dependency
  # to its floor (-Z direct-minimal-versions, nightly), builds the workspace, and
  # runs the engine suites there. A floor below the resolvable minimum (a
  # transitive crate forces higher) fails the resolution; a floor below an API
  # the code uses fails the build. Scheduled, not per-PR: upstream churn can make
  # a floor newly dishonest with no local change — a maintenance signal, like the
  # claims-expiry gates, not a defect in unrelated work.
  minimal-versions:
    name: Dependency floors (oldest versions resolve, build, and test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install nightly (for -Z direct-minimal-versions) and stable
        run: |
          rustup toolchain install nightly --profile minimal --no-self-update
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Resolve to the declared floors, then build and test there
        run: cargo xtask minimal-versions

  # Bench history accumulates as weekly artifacts (the round-two deferral
  # "bench history not accumulating", liquidated): measured, never gated —
  # benches/README.md records why no threshold exists. Compare runs by
  # downloading two artifacts and diffing criterion's estimates.
  bench:
    name: Benchmarks (history artifact)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run benchmarks
        run: cargo bench --workspace
      - name: Upload criterion estimates
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-history-${{ github.run_id }}
          path: target/criterion/
          if-no-files-found: error
          retention-days: 90

  # The claims-expire gates (ADR-0010): the deferral ledger's review-by dates
  # and the registry's verbatim quotes, both re-verified weekly. Failures
  # here page the schedule, not PRs — an expired deferral or a drifted quote
  # is a maintenance event, not a defect in unrelated work.
  claims-expire:
    name: Deferral ledger + spec-quote drift (ADR-0010)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Deferral ledger within its review dates
        run: cargo xtask deferrals --check
      - name: Registry quotes match the published spec text
        run: cargo xtask spec-drift
