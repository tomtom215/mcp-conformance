[alias]
xtask = "run -p xtask --"

# Big-endian cross-check (`cargo xtask endian`, scheduled `endian` CI job):
# build the engine crates for s390x and run them under qemu-user, proving the
# canonical form, the JSON/JUnit reports, and the golden corpus are
# byte-identical on a big-endian target — the one platform class CI's
# little-endian hosts (x86-64/aarch64 Linux/macOS/Windows) never exercise.
# Paths are the Debian/Ubuntu cross-package layout (gcc-s390x-linux-gnu,
# qemu-user-static); `-L` points qemu at the s390x sysroot so it can find the
# dynamic loader and libc. The gate skips loudly when these are absent, and the
# CI job installs exactly these packages.
[target.s390x-unknown-linux-gnu]
linker = "s390x-linux-gnu-gcc"
runner = ["qemu-s390x-static", "-L", "/usr/s390x-linux-gnu"]
